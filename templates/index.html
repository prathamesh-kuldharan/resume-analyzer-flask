<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        
        <div class="header-area">
            <h1>Resume Analyzer</h1>
            <p class="subtitle">Upload a resume to extract technical skills and CGPA metrics instantly.</p>
        </div>

        <div class="card">
            <form action="/" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="resume_file">Upload Resume (PDF or TXT)</label>
                    <input type="file" id="resume_file" name="resume_file" class="file-input" required>
                </div>
                <button type="submit" class="btn-submit">Analyze Resume</button>
            </form>
        </div>

        {% if skills is defined or cgpa is defined %}
        <div class="card result-card">
            <h2>Extracted Results</h2>
            <div class="result-item">
                <strong>CGPA:</strong> <span class="highlight">{{ cgpa }}</span>
            </div>
            <div class="result-item">
                <strong>Skills Identified:</strong>
                <div class="skills-list">
                    {% for skill in skills %}
                    <span class="skill-tag">{{ skill }}</span>
                    {% else %}
                    <span class="no-data">No specific skills found.</span>
                    {% endfor %}
                </div>
            </div>
        </div>
        {% endif %}
        
    </div>
</body>
</html>
